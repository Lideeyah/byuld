name: Keep Render API warm

# Render's free tier sleeps after ~15 min idle, and the cold-start (60–120s) makes
# the first user action hang. This pings the health endpoint every 10 minutes so the
# server stays awake and the build review/chat respond instantly.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          curl -s -m 120 -o /dev/null -w "health: HTTP %{http_code} in %{time_total}s\n" \
            https://byuld.onrender.com/api/health || echo "ping failed (server may be waking)"
