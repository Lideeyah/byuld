services:
  - type: web
    name: byuld-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node api/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MOONPAY_SECRET_KEY
        sync: false
      - key: MOONPAY_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
